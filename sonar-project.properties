# SonarQube Scanner configuration for DineDash
# This file is picked up automatically by sonar-scanner CLI

sonar.projectKey=dinedash
sonar.projectName=DineDash
sonar.projectVersion=1.0

# Source directory
sonar.sources=src

# Encoding of the source files
sonar.sourceEncoding=UTF-8

# Exclusions — skip test files, build output, and node_modules
sonar.exclusions=**/node_modules/**,**/build/**,**/*.test.js,**/*.spec.js,**/coverage/**

# Test report paths (generate with: npm test -- --coverage)
# Uncomment after setting up test coverage:
# sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Language
sonar.language=js
