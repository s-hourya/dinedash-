apiVersion: apps/v1
kind: Deployment
metadata:
  name: dinedash
  labels:
    app: dinedash
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dinedash
  template:
    metadata:
      labels:
        app: dinedash
    spec:
      containers:
      - name: dinedash
        image: your-dockerhub-username/dinedash:latest  # ← CHANGE THIS
        ports:
        - containerPort: 80
